name: API Test CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4  # 拉代码

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps & Run pytest  # 合并pip+测试
      run: |
        pip install pytest requests pytest-html
        pytest test_api_ok.py -v --html=report.html --self-contained-html

    - name: Upload report  # 下载HTML报告
      uses: actions/upload-artifact@v4
      if: always()  # 失败也上传
      with:
        name: pytest-report-${{ github.run_number }}
        path: report.html
