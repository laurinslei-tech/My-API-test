name: API Test CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install & Test
      run: |
        pip install pytest requests pytest-html
        pytest test_api_ok.py -v --html=report.html --self-contained-html

    - name: Upload HTML Report  # 强制上传
      uses: actions/upload-artifact@v4
      if: always()  # 总是上传
      with:
        name: test-report
        path: report.html
        retention-days: 7  # 保留7天